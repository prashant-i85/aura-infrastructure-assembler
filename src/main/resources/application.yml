server:
  port: 8080

spring:
  application:
    name: AURA Infrastructure Assembler

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 25
      thread-name-prefix: aura-executor-

# AURA-specific Terraform configuration
terraform:
  workspaces-dir: terraform-workspaces
  terraform-path: C:/Users/sunym/AppData/Local/Microsoft/WinGet/Packages/Hashicorp.Terraform_Microsoft.Winget.Source_8wekyb3d8bbwe/terraform.exe
  command-timeout-seconds: 300

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.aura: INFO
    org.springframework: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/aura.log
